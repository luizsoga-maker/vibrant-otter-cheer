name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"] # change if your production branch is different
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          # Set base path for GitHub Pages deployment
          # This ensures proper routing when using custom base paths
          # The base path will be automatically inferred from repo name
          # but we also set it explicitly for clarity
          # Add this before the publish step if needed:
          # env:
          #   VITE_BASE_PATH: ${{ github.repository_owner }}/${{ github.event.repository.name }}